name: Release

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    # Run on manual dispatch, or when a PR starting with "release/" is merged
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged && startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish packages
        id: publish
        run: |
          TAGS_BEFORE=$(git tag --list)
          bun run release
          TAGS_AFTER=$(git tag --list)
          NEW_TAGS=$(comm -13 <(echo "$TAGS_BEFORE" | sort) <(echo "$TAGS_AFTER" | sort) | tr '\n' ' ')
          echo "new_tags=$NEW_TAGS" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Push tags
        if: steps.publish.outputs.new_tags != ''
        run: git push --tags

      - name: Create GitHub Releases
        if: steps.publish.outputs.new_tags != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=""
          LATEST_VER=""
          for TAG in ${{ steps.publish.outputs.new_tags }}; do
            # Extract package name and version from tag (e.g., @skills/cli@0.1.2)
            if [[ "$TAG" =~ ^(.+)@([0-9]+\..+)$ ]]; then
              PKG="${BASH_REMATCH[1]}"
              VER="${BASH_REMATCH[2]}"
              PKG_DIR=$(node -e '
                const fs = require("fs");
                const path = require("path");

                const pkgName = process.argv[1];
                const packagesDir = path.join(process.cwd(), "packages");

                for (const entry of fs.readdirSync(packagesDir)) {
                  const pkgJson = path.join(packagesDir, entry, "package.json");
                  if (!fs.existsSync(pkgJson)) continue;
                  const pkg = JSON.parse(fs.readFileSync(pkgJson, "utf8"));
                  if (pkg.name === pkgName) {
                    process.stdout.write(path.join("packages", entry));
                    process.exit(0);
                  }
                }

                process.exit(1);
              ' "$PKG")

              if [[ -z "$PKG_DIR" ]]; then
                echo "Could not find package directory for $PKG" >&2
                exit 1
              fi

              CHANGELOG_FILE="$PKG_DIR/CHANGELOG.md"
              if [[ ! -f "$CHANGELOG_FILE" ]]; then
                echo "Missing changelog for $PKG at $CHANGELOG_FILE" >&2
                exit 1
              fi

              NOTES_FILE=$(mktemp)
              awk -v version="$VER" '
                $0 == "## " version { capture = 1; next }
                capture && /^## / { exit }
                capture { print }
              ' "$CHANGELOG_FILE" > "$NOTES_FILE"

              if [[ ! -s "$NOTES_FILE" ]]; then
                echo "Could not extract release notes for $PKG@$VER from $CHANGELOG_FILE" >&2
                exit 1
              fi

              gh release create "$TAG" --title "${PKG}@${VER}" --notes-file "$NOTES_FILE" --latest=false

              # Track the highest version to mark as latest
              if [[ -z "$LATEST_VER" ]] || printf '%s\n%s\n' "$LATEST_VER" "$VER" | sort -V | tail -1 | grep -qx "$VER"; then
                LATEST_TAG="$TAG"
                LATEST_VER="$VER"
              fi
            fi
          done

          # Mark the release with the highest version as latest
          if [[ -n "$LATEST_TAG" ]]; then
            gh release edit "$LATEST_TAG" --latest
          fi
